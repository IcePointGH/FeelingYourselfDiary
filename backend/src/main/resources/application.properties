server.port=8080
spring.application.name=backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/emotion_diary?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
# ===== 生产部署前注意 =====TODO
# spring.jpa.hibernate.ddl-auto: 当前为 update，生产环境应改为 validate 或 none
# jwt.secret: 当前默认值为空字符串，生产环境必须配置强密钥（≥32字符）
# 连接池(HikariCP): 当前使用默认值，生产环境应根据负载调整 max-pool-size 等参数
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.session_factory.inject_statement_inspector=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration (for local development)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Redis Configuration (Redisson)
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}
redis.password=${REDIS_PASSWORD:redis123}

# Spring Cache defaults (overridden by @Cacheable-specific configs)
spring.cache.redis.time-to-live=5m
spring.cache.redis.key-prefix=diary::

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket-name=avatars
# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
