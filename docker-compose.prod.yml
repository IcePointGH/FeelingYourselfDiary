version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: emotion_diary_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: emotion_diary
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - diary-network

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: emotion_diary_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USERNAME}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - diary-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotion_diary_backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/emotion_diary?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # ===== 生产部署前注意 =====
      #TODO
      # CORS_ORIGINS: 当前默认值为 *（允许所有来源），生产环境应设置为具体前端域名
      # 示例: CORS_ORIGINS: ${CORS_ORIGINS:-https://your-frontend-domain.com}
      # JWT_SECRET: 当前使用占位符，生产环境必须替换为强随机密钥
      # DB_PASSWORD / MINIO 密钥: 当前使用占位符，生产环境必须替换
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USERNAME}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - diary-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emotion_diary_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - diary-network

volumes:
  mysql_data:
  minio_data:

networks:
  diary-network:
    driver: bridge
